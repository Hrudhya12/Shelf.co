<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shelf.co – Books</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding-top: 80px;
    }

    .navbar {
      background: #1f1f1f;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 18px;
    }

    .navbar .logo {
      font-size: 24px;
      font-weight: bold;
    }

    #search {
      padding: 10px;
      width: 300px;
      margin: 20px auto;
      display: block;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 20px;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .book {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }

    .book img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
    }

    .book h3 {
      margin: 10px 0 5px;
    }

    .book p {
      margin: 0;
      color: #555;
    }

    .btn,
    .delete-btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      box-sizing: border-box;
    }

    .btn {
      background: #3a7afe;
      color: white;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }

    .delete-btn {
      background: #d9534f;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="logo">Shelf.co</a>
    </div>
    <div class="nav-right">
      <a href="products.html">Books</a>
      <a href="order.html">Orders</a>
      <a href="addpro.html" id="add-book-link" style="display:none">Add Book</a>
      <a href="login.html" id="login-link">Login</a>
      <a href="#" id="logout-link" style="display:none" onclick="logout()">Logout</a>
    </div>
  </nav>

  <input type="text" id="search" placeholder="Search by title...">

  <div class="grid" id="product-grid"></div>

  <script>
    function setupAdminLink() {
      const user = getUser();
      const addBookLink = document.getElementById("add-book-link");

      if (user && user.role === "admin") {
        addBookLink.style.display = "inline";
      } else {
        addBookLink.style.display = "none";
      }
    }

    function getUser() {
      const raw = localStorage.getItem("user");
      return raw ? JSON.parse(raw) : null;
    }

    function isAdmin() {
      const user = getUser();
      return user && user.role === "admin";
    }

    function setupAuthLinks() {
      const user = getUser();
      const loginLink = document.getElementById("login-link");
      const logoutLink = document.getElementById("logout-link");

      if (user) {
        loginLink.style.display = "none";
        logoutLink.style.display = "inline";
      } else {
        loginLink.style.display = "inline";
        logoutLink.style.display = "none";
      }
    }

    function logout() {
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }

    let allProducts = [];

    async function loadProducts() {
      const response = await fetch("http://localhost:3000/products");
      allProducts = await response.json();
      renderProducts(allProducts);
    }

    function viewDetails(id) {
      const user = getUser();
      if (!user) {
        alert("Please log in to view details");
        window.location.href = "login.html";
        return;
      }
      window.location.href = `details.html?id=${id}`;
    }

    function renderProducts(list) {
      const grid = document.getElementById("product-grid");
      grid.innerHTML = "";

      list.forEach(p => {
        const div = document.createElement("div");
        div.className = "book";

        div.innerHTML = `
          <img src="${p.image}" alt="${p.title}">
          <h3>${p.title}</h3>
          <p>$${p.price}</p>

          <button class="btn" onclick="viewDetails('${p._id}')">View Details</button>

          ${isAdmin() ? `<button class="delete-btn" onclick="deleteBook('${p._id}')">Delete</button>` : ""}
        `;

        grid.appendChild(div);
      });
    }

    async function deleteBook(id) {
      if (!confirm("Delete this book?")) return;

      const response = await fetch(`http://localhost:3000/products/${id}`, {
        method: "DELETE"
      });

      const result = await response.json();
      alert(result.message);
      loadProducts();
    }

    document.getElementById("search").addEventListener("input", (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = allProducts.filter(p =>
        p.title.toLowerCase().includes(term)
      );
      renderProducts(filtered);
    });


    setupAuthLinks();
    setupAdminLink();
    loadProducts();
  </script>

</body>
</html>
