<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Details – Shelf.co</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding-top: 80px;
    }

    .navbar {
      background: #1f1f1f;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 18px;
    }

    .navbar .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      gap: 20px;
    }

    img {
      width: 250px;
      height: 350px;
      object-fit: cover;
      border-radius: 6px;
    }

    .info h2 {
      margin-top: 0;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      background: #3a7afe;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>

  <!-- PayPal Sandbox SDK -->
  <script src="https://www.paypal.com/sdk/js?client-id=Af8nFqhKt27udIX8jdrU8RcHBTJNFSxWGMhEz-SsYoC3U3BnoGt2Bc7X1rxMFvyH-itRJUio6UI_f4ik&currency=USD"></script>
</head>

<body>

  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="logo">Shelf.co</a>
    </div>
    <div class="nav-right">
      <a href="products.html">Books</a>
      <a href="order.html">Orders</a>
      <a href="login.html" id="login-link">Login</a>
      <a href="#" id="logout-link" style="display:none" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="container" id="details"></div>

  <script>
    function getUser() {
      const raw = localStorage.getItem("user");
      return raw ? JSON.parse(raw) : null;
    }

    function setupAuthLinks() {
      const user = getUser();
      const loginLink = document.getElementById("login-link");
      const logoutLink = document.getElementById("logout-link");

      if (user) {
        loginLink.style.display = "none";
        logoutLink.style.display = "inline";
      } else {
        loginLink.style.display = "inline";
        logoutLink.style.display = "none";
      }
    }

    function logout() {
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }

    const user = getUser();
    if (!user) {
      alert("Please log in to view details");
      window.location.href = "login.html";
    }

    function getIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    async function loadDetails() {
      const id = getIdFromUrl();
      const response = await fetch(`http://localhost:3000/products/${id}`);
      const p = await response.json();

      const container = document.getElementById("details");
      container.innerHTML = `
        <img src="${p.image}" alt="${p.title}">
        <div class="info">
          <h2>${p.title}</h2>
          <p><strong>Author:</strong> ${p.author}</p>
          <p><strong>Price:</strong> $${p.price}</p>
          <p>${p.description}</p>

          <!-- PayPal button container -->
          <div id="paypal-button-container"></div>
        </div>
      `;

      // Render PayPal button AFTER product loads
      renderPayPalButton(p._id, p.title, p.price);
    }

    function renderPayPalButton(productId, productTitle, price) {
      const user = getUser();

      paypal.Buttons({
        createOrder: function(data, actions) {
          return actions.order.create({
            purchase_units: [{
              amount: {
                value: price.toString()
              },
              description: productTitle
            }]
          });
        },

        onApprove: async function(data, actions) {
          await actions.order.capture();

          // Save order in MongoDB
          const response = await fetch("http://localhost:3000/orders", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              productId,
              productTitle,
              price,
              username: user.username
            })
          });

          const result = await response.json();
          alert("Payment successful!");
          window.location.href = "payment-success.html";
        }

      }).render("#paypal-button-container");
    }

    setupAuthLinks();
    loadDetails();
  </script>

</body>
</html>
