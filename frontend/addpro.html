<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Book – Shelf.co</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding-top: 80px;
    }

    .navbar {
      background: #1f1f1f;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 18px;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #3a7afe;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #2f63d8;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="logo">Shelf.co</a>
    </div>
    <div class="nav-right">
      <a href="products.html">Books</a>
      <a href="order.html">Orders</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="container">
    <h2>Add a New Book</h2>

    <input id="title" placeholder="Book Title">
    <input id="author" placeholder="Author">
    <input id="price" type="number" placeholder="Price">
    <input id="image" placeholder="Image URL">
    <textarea id="description" placeholder="Description"></textarea>

    <button onclick="addBook()">Add Book</button>
  </div>

  <script>
    function getUser() {
      const raw = localStorage.getItem("user");
      return raw ? JSON.parse(raw) : null;
    }

    const user = getUser();
    if (!user || user.role !== "admin") {
      alert("Only admins can add books");
      window.location.href = "products.html";
    }

    function logout() {
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }

    async function addBook() {
      const title = document.getElementById("title").value;
      const author = document.getElementById("author").value;
      const price = document.getElementById("price").value;
      const image = document.getElementById("image").value;
      const description = document.getElementById("description").value;

      const response = await fetch("http://localhost:3000/add-product", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, author, price, image, description })
      });

      const result = await response.json();
      alert(result.message);
      window.location.href = "products.html";
    }
  </script>

</body>
</html>
