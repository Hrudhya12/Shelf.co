<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shelf.co – Home</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .navbar {
      background: #1f1f1f;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 18px;
    }

    .navbar .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 120px 20px;
      background: #e6e6e6; 
      color: #333;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 20px;
      margin-bottom: 20px;
      color: #555;
    }

    .hero-btn {
      background: #3a7afe;
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
    }

    .hero-btn:hover {
      background: #2f63d8;
    }

    .featured {
      max-width: 900px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .featured img {
      width: 250px;
      height: 350px;
      object-fit: cover;
      border-radius: 8px;
    }

    .featured-info h2 {
      margin-top: 0;
      font-size: 28px;
    }

    .featured-info p {
      color: #555;
      line-height: 1.5;
    }

    .featured-btn {
      margin-top: 15px;
      display: inline-block;
      background: #3a7afe;
      color: white;
      padding: 10px 18px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 16px;
    }

    .featured-btn:hover {
      background: #2f63d8;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="logo">Shelf.co</a>
    </div>
    <div class="nav-right">
      <a href="products.html">Books</a>
      <a href="login.html">Login</a>
    </div>
  </nav>

  <section class="hero">
    <h1>Welcome to Shelf.co</h1>
    <p>Your digital bookstore for every mood</p>
    <a href="products.html" class="hero-btn">Browse Books</a>
  </section>

  <div class="featured" id="featured-book">
    
  </div>

  <script>
    
    async function loadFeaturedBook() {
      const response = await fetch("http://localhost:3000/products");
      const books = await response.json();

      if (books.length === 0) {
        document.getElementById("featured-book").innerHTML = "<p>No books available.</p>";
        return;
      }

      
      const book = books[Math.floor(Math.random() * books.length)];

      document.getElementById("featured-book").innerHTML = `
        <img src="${book.image}" alt="${book.title}">
        <div class="featured-info">
          <h2>Featured Book: ${book.title}</h2>
          <p><strong>Author:</strong> ${book.author}</p>
          <p>${book.description.substring(0, 180)}...</p>
          <a href="details.html?id=${book._id}" class="featured-btn">View Details</a>
        </div>
      `;
    }

    loadFeaturedBook();
  </script>

</body>
</html>
